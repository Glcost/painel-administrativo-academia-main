<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM SPORTS - ADM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/logogym.png" type="image/x-icon">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-smart-yellow { background-color: #FFD700; }
        .text-smart-yellow { color: #FFD700; }
        .border-smart-yellow { border-color: #FFD700; }
        input:focus { outline: none; border-color: #FFD700 !important; }
    </style>
</head>
<body class="bg-black min-h-screen text-zinc-300">

    <nav class="bg-zinc-950 border-b border-zinc-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic tracking-tighter">
                GYM<span class="text-smart-yellow">SPORTS</span> <span class="text-xs not-italic font-light tracking-normal ml-2 text-zinc-500 uppercase">Admin</span>
            </h1>
            <div id="userInfo" class="hidden flex items-center gap-6">
                <span class="text-xs font-bold uppercase tracking-widest text-zinc-500">
                    <i class="fas fa-user-shield text-smart-yellow mr-2"></i> Unidade Central
                </span>
                <button id="btnLogout" class="text-xs font-black uppercase tracking-widest hover:text-white transition-colors">
                    Sair <i class="fas fa-sign-out-alt ml-1"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-10">

        <div id="loginSection" class="max-w-sm mx-auto bg-zinc-950 border border-zinc-800 p-8 mt-20">
            <header class="text-center mb-10">
                <h2 class="text-xl font-black text-white uppercase tracking-tight">Acesso ao Painel</h2>
                <div class="h-1 w-10 bg-smart-yellow mx-auto mt-2"></div>
            </header>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-2">Usuário</label>
                    <input type="text" id="usuario" required class="w-full bg-zinc-900 border border-zinc-800 text-white px-4 py-3 text-sm transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-2">Senha</label>
                    <input type="password" id="password" required class="w-full bg-zinc-900 border border-zinc-800 text-white px-4 py-3 text-sm transition-all">
                </div>
                <button type="submit" class="w-full bg-smart-yellow text-black font-black py-4 uppercase tracking-widest text-sm hover:brightness-110 active:scale-95 transition-all">
                    Entrar
                </button>
                <div id="loginError" class="hidden text-red-500 text-[10px] font-bold text-center uppercase tracking-wider"></div>
            </form>
        </div>

        <div id="adminSection" class="hidden space-y-12">
            
            <div class="flex items-center gap-4 bg-zinc-950 border-l-4 border-smart-yellow p-6 w-fit">
                <div class="text-zinc-500 uppercase text-[10px] font-bold tracking-[0.3em]">Total de Atletas</div>
                <div id="totalCliente" class="text-4xl font-black text-white">0</div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-4">
                    <div class="bg-zinc-950 border border-zinc-800 p-6 sticky top-6">
                        <h3 id="formTitle" class="text-sm font-black text-white uppercase tracking-widest mb-8 flex items-center gap-3">
                            <span class="w-2 h-2 bg-smart-yellow"></span> Novo Cadastro
                        </h3>

                        <form id="clienteForm" class="space-y-6">
                            <input type="hidden" id="clientescpf">
                            <div>
                                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Nome Completo</label>
                                <input type="text" id="nome" required placeholder="NOME DO ALUNO" class="w-full bg-zinc-900 border border-zinc-800 text-white px-4 py-3 text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">CPF (Somente números)</label>
                                <input type="text" id="cpf" maxlength="11" required placeholder="00000000000" class="w-full bg-zinc-900 border border-zinc-800 text-white px-4 py-3 text-sm font-mono">
                            </div>
                            <div class="flex gap-2">
                                <button type="submit" class="flex-1 bg-white text-black font-black py-3 uppercase text-xs tracking-tighter hover:bg-smart-yellow transition-all">
                                    Salvar Dados
                                </button>
                                <button type="button" id="btnCancelar" class="hidden flex-1 border border-zinc-800 text-zinc-500 font-bold py-3 uppercase text-[10px] hover:text-white transition-all">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div class="bg-zinc-950 border border-zinc-800 overflow-hidden">
                        <div class="p-6 border-b border-zinc-900 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div class="relative w-full md:w-72">
                                <input type="text" id="buscaNome" placeholder="BUSCAR ALUNO..." class="w-full bg-zinc-900 border border-zinc-800 text-white pl-10 pr-4 py-2 text-xs font-bold uppercase tracking-widest">
                                <i class="fas fa-search absolute left-3 top-2.5 text-zinc-600 text-xs"></i>
                            </div>
                            <button onclick="carregarClientes()" class="text-[10px] font-black uppercase text-zinc-500 hover:text-smart-yellow transition-all">
                                <i class="fas fa-sync-alt mr-1"></i> Atualizar Lista
                            </button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse">
                                <thead>
                                    <tr class="bg-zinc-900/50 text-[10px] font-black uppercase tracking-widest text-zinc-500 border-b border-zinc-800">
                                        <th class="px-6 py-4 text-left">Aluno</th>
                                        <th class="px-6 py-4 text-left">CPF</th>
                                        <th class="px-6 py-4 text-left">Status</th>
                                        <th class="px-6 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaCliente" class="divide-y divide-zinc-900">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
