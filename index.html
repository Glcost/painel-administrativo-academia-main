<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <i class="fas fa-dumbbell text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-wider">Admin Academia</span>
                </div>
                <div id="userInfo" class="hidden flex items-center gap-4">
                    <span class="text-sm font-medium">
                        <i class="fas fa-user-shield mr-1"></i>
                        Administrador
                    </span>
                    <button id="btnLogout"
                        class="bg-white text-indigo-600 hover:bg-gray-100 px-4 py-2 rounded-md text-sm font-medium transition duration-200">
                        <i class="fas fa-sign-out-alt mr-2"></i>Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <!-- SESSÃO DE LOGIN -->
        <div id="loginSection" class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mt-10">
            <div class="text-center mb-8">
                <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-3xl text-indigo-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acesso Restrito</h2>
                <p class="text-sm text-gray-500 mt-2">Faça login para gerenciar os clientes</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Usuário</label>
                    <input type="text" id="usuario" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="password" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-200">
                    <i class="fas fa-sign-in-alt mr-2"></i> Entrar
                </button>
                <div id="loginError" class="hidden text-red-500 text-sm text-center mt-2"></div>
            </form>
        </div>

        <!-- SESSÃO ADMINISTRATIVA -->
        <div id="adminSection" class="hidden space-y-8">
            <!-- Cards de Resumo -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center">
                    <div class="p-3 rounded-full bg-indigo-100 text-indigo-600 mr-4">
                        <i class="fas fa-users text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Total de Clientes</p>
                        <p id="totalCliente" class="text-2xl font-bold text-gray-800">0</p>
                    </div>
                </div>
            </div>

            <!-- Formulário e Lista em Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Formulário -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 sticky top-6">
                        <h3 id="formTitle" class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">
                            <i class="fas fa-user-plus mr-2 text-indigo-600"></i>
                            Novo Cliente
                        </h3>

                        <form id="clienteForm" class="space-y-4">
                            <input type="hidden" id="clientescpf">

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <i class="fas fa-user mr-1"></i> Nome Completo
                                </label>
                                <input type="text" id="nome" name="nome" required
                                    placeholder="Digite o nome completo"
                                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    <i class="fas fa-id-card mr-1"></i> CPF (apenas números)
                                </label>
                                <input type="text" id="cpf" name="cpf" inputmode="numeric"
                                    placeholder="Ex: 12345678901" maxlength="11" required
                                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-indigo-500 focus:border-indigo-500">
                                <p class="text-xs text-gray-500 mt-1">Digite apenas números (11 dígitos)</p>
                            </div>

                            <div class="flex gap-2 pt-2">
                                <button type="submit"
                                    class="flex-1 bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                                    <i class="fas fa-save"></i> Salvar
                                </button>
                                <button type="button" id="btnCancelar"
                                    class="hidden flex-1 bg-gray-200 text-gray-700 py-2 rounded-md hover:bg-gray-300 transition flex items-center justify-center gap-2">
                                    <i class="fas fa-times"></i> Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Lista de Clientes -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <h3 class="text-lg font-bold text-gray-800">
                                <i class="fas fa-list mr-2 text-indigo-600"></i>
                                Gerenciar Clientes
                            </h3>
                            <button onclick="carregarClientes()"
                                class="text-indigo-600 hover:text-indigo-800 text-sm font-medium transition">
                                <i class="fas fa-sync-alt mr-1"></i> Atualizar
                            </button>
                        </div>

                        <div class="p-4 border-b border-gray-200">
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                    <i class="fas fa-search"></i>
                                </span>
                                <input type="text" id="buscaNome" placeholder="Buscar cliente por nome ou CPF..."
                                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 sm:text-sm">
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Nome
                                        </th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            CPF
                                        </th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Status
                                        </th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Ações
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaCliente" class="bg-white divide-y divide-gray-200">
                                    <!-- Dados serão inseridos via JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
